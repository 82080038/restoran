<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Food & Beverages Management System</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .error {
            color: #dc3545;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🍽️</div>
        <h1>Food & Beverages Management System</h1>
        <p>Sign in to your account</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            
            <div style="text-align:right;margin-bottom:12px">
                <a href="#" id="forgotPasswordLink" style="font-size:12px;color:#667eea;text-decoration:none">Forgot Password?</a>
            </div>
            <button type="submit" class="btn" id="loginBtn">Sign In</button>
            
            <div class="error" id="errorMessage"></div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; font-size: 14px;">Signing in...</p>
            </div>
        </form>
        
        <div class="back-link">
            <a href="landing.html">← Back to Home</a>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/auth-manager.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            const loading = document.getElementById('loading');
            
            // Reset error
            errorMessage.style.display = 'none';
            
            // Show loading
            loginBtn.disabled = true;
            loading.style.display = 'block';
            
            try {
                // Call login API
                const response = await fetch(`${Config.api.baseURL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // API returns { success: true, data: { access_token, user } }
                    const token = data.data.access_token;
                    const user = data.data.user;
                    
                    // Store token and user info
                    localStorage.setItem(Config.auth.tokenKey, token);
                    localStorage.setItem(Config.auth.userKey, JSON.stringify(user));
                    if (user.tenant_id) {
                        localStorage.setItem(Config.auth.tenantIdKey, user.tenant_id);
                    }
                    if (user.branch_id) {
                        localStorage.setItem(Config.auth.branchIdKey, user.branch_id);
                    }
                    
                    // Redirect to dashboard
                    window.location.href = '/dashboard/index.html';
                } else {
                    // Show error
                    errorMessage.textContent = data.message || 'Login failed. Please try again.';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Network error. Please try again.';
                errorMessage.style.display = 'block';
            } finally {
                // Hide loading
                loginBtn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>
<!-- Forgot Password Modal -->
<div id="forgotModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center">
    <div style="background:white;border-radius:12px;padding:30px;width:380px;max-width:90%">
        <h3 style="margin-bottom:8px;color:#2c3e50">Reset Password</h3>
        <p style="font-size:13px;color:#7f8c8d;margin-bottom:16px">Enter your email address and we'll send you a reset link.</p>
        <input type="email" id="forgotEmail" placeholder="Your email address" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px">
        <div id="forgotAlert" style="margin-bottom:12px"></div>
        <div style="display:flex;gap:10px">
            <button onclick="closeForgotModal()" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;background:white;cursor:pointer">Cancel</button>
            <button onclick="sendForgotRequest()" id="forgotSubmitBtn" style="flex:1;padding:10px;border:none;border-radius:8px;background:#667eea;color:white;cursor:pointer">Send Link</button>
        </div>
    </div>
</div>
<script>
const API_BASE = window.location.origin + '/restoran/BACKEND/public/api/v1';
document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('forgotModal').style.display = 'flex';
});
function closeForgotModal() {
    document.getElementById('forgotModal').style.display = 'none';
    document.getElementById('forgotAlert').innerHTML = '';
    document.getElementById('forgotEmail').value = '';
}
async function sendForgotRequest() {
    const email = document.getElementById('forgotEmail').value;
    if (!email) return;
    const btn = document.getElementById('forgotSubmitBtn');
    btn.disabled = true; btn.textContent = 'Sending...';
    try {
        const resp = await fetch(API_BASE + '/auth/forgot-password', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await resp.json();
        document.getElementById('forgotAlert').innerHTML = '<div style="padding:10px;border-radius:6px;background:#d4edda;color:#155724;font-size:13px">' + (data.message || 'Reset link sent if email exists') + '</div>';
        btn.textContent = 'Sent';
        setTimeout(closeForgotModal, 3000);
    } catch (err) {
        document.getElementById('forgotAlert').innerHTML = '<div style="padding:10px;border-radius:6px;background:#f8d7da;color:#721c24;font-size:13px">Connection error</div>';
    }
    btn.disabled = false; btn.textContent = 'Send Link';
}
</script>
</body>
</html>
