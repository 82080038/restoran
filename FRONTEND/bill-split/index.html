<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Split Manager - F&B Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Header */
        .header { background: #2c3e50; color: white; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
        .header h3 { font-size: 18px; }
        .header .table-info { margin-left: auto; font-size: 14px; color: #95a5a6; }
        .header .table-info strong { color: white; }

        /* Layout */
        .main { display: flex; flex-grow: 1; overflow: hidden; }

        /* Groups Panel */
        .groups-panel { width: 320px; background: white; border-right: 1px solid #e0e0e0; overflow-y: auto; padding: 16px; }
        .groups-panel h4 { font-size: 14px; color: #2c3e50; margin-bottom: 12px; }
        .group-card { border: 2px solid; border-radius: 10px; padding: 14px; margin-bottom: 12px; cursor: pointer; transition: transform 0.15s; }
        .group-card:hover { transform: translateY(-2px); }
        .group-card.selected { box-shadow: 0 0 0 3px rgba(102,126,234,0.3); }
        .group-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .group-color-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid; }
        .group-card h5 { font-size: 14px; flex: 1; }
        .group-card .group-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
        .group-card .group-status.active { background: #d4edda; color: #155724; }
        .group-card .bill-amount { font-size: 20px; font-weight: 800; margin: 8px 0; }
        .group-card .bill-status { font-size: 11px; }
        .group-card .bill-status.paid { color: #27ae60; }
        .group-card .bill-status.unpaid { color: #e74c3c; }
        .group-card .members-list { font-size: 11px; color: #7f8c8d; margin-top: 6px; }
        .group-card .members-list i { margin-right: 4px; }

        .add-group-btn { width: 100%; padding: 10px; border: 2px dashed #bbb; border-radius: 8px; background: transparent; cursor: pointer; font-size: 13px; color: #7f8c8d; transition: all 0.15s; }
        .add-group-btn:hover { border-color: #667eea; color: #667eea; }

        /* Bills Panel */
        .bills-panel { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .bills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .bill-card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-top: 4px solid; }
        .bill-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .bill-card-header h5 { font-size: 15px; }
        .bill-number { font-size: 11px; color: #95a5a6; }
        .bill-items { margin-bottom: 12px; }
        .bill-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        .bill-item .item-name { color: #2c3e50; }
        .bill-item .item-price { color: #555; font-weight: 600; }
        .bill-item .item-split { font-size: 10px; color: #95a5a6; }
        .bill-totals { padding-top: 8px; }
        .bill-total-row { display: flex; justify-content: space-between; font-size: 12px; color: #555; padding: 2px 0; }
        .bill-total-row.grand { font-size: 16px; font-weight: 800; color: #2c3e50; border-top: 2px solid #eee; padding-top: 8px; margin-top: 4px; }
        .bill-actions { display: flex; gap: 6px; margin-top: 12px; }
        .bill-actions button { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; }
        .btn-pay { background: #27ae60; color: white; }
        .btn-pay:hover { background: #219a52; }
        .btn-split { background: #667eea; color: white; }
        .btn-split:hover { background: #5568d3; }
        .btn-merge { background: #f39c12; color: white; }
        .btn-merge:hover { background: #e08e0b; }
        .btn-paid { background: #d5dbdb; color: #7f8c8d; cursor: default; }

        /* Summary Bar */
        .summary-bar { background: white; border-bottom: 1px solid #e0e0e0; padding: 12px 24px; display: flex; gap: 24px; align-items: center; }
        .summary-item { display: flex; align-items: center; gap: 8px; }
        .summary-item .label { font-size: 12px; color: #7f8c8d; }
        .summary-item .value { font-size: 18px; font-weight: 800; }
        .summary-item.total .value { color: #2c3e50; }
        .summary-item.paid .value { color: #27ae60; }
        .summary-item.unpaid .value { color: #e74c3c; }
        .summary-actions { margin-left: auto; display: flex; gap: 8px; }
        .summary-actions button { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 600; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 12px; padding: 24px; width: 420px; max-width: 90%; }
        .modal h3 { margin-bottom: 16px; }
        .modal .form-group { margin-bottom: 12px; }
        .modal .form-group label { font-size: 12px; color: #7f8c8d; display: block; margin-bottom: 4px; }
        .modal .form-group input, .modal .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .modal .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
        .modal .modal-actions button { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
        .modal .btn-primary { background: #667eea; color: white; }
        .modal .btn-secondary { background: #e0e0e0; }
        .modal .btn-danger { background: #e74c3c; color: white; }

        .chair-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
        .chair-pick { width: 40px; height: 40px; border: 2px solid #ddd; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; font-weight: 700; }
        .chair-pick.selected { border-color: #667eea; background: rgba(102,126,234,0.1); color: #667eea; }
        .chair-pick.assigned { border-color: #ccc; background: #f0f0f0; color: #aaa; cursor: not-allowed; }

        .empty-state { text-align: center; padding: 60px 20px; color: #95a5a6; }
        .empty-state i { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h3><i class="fas fa-receipt"></i> Bill Split Manager</h3>
        <div class="table-info" id="table-info">Loading...</div>
    </div>

    <div class="summary-bar" id="summary-bar">
        <div class="summary-item total"><span class="label">Total:</span><span class="value" id="sum-total">Rp 0</span></div>
        <div class="summary-item paid"><span class="label">Paid:</span><span class="value" id="sum-paid">Rp 0</span></div>
        <div class="summary-item unpaid"><span class="label">Unpaid:</span><span class="value" id="sum-unpaid">Rp 0</span></div>
        <div class="summary-actions">
            <button class="btn-merge" onclick="showMergeModal()"><i class="fas fa-code-branch"></i> Merge Bills</button>
            <button class="btn-split" onclick="showSplitModal()"><i class="fas fa-cut"></i> Split Equal</button>
        </div>
    </div>

    <div class="main">
        <div class="groups-panel">
            <h4><i class="fas fa-users"></i> Groups at Table</h4>
            <div id="groups-list"></div>
            <button class="add-group-btn" onclick="showAddGroupModal()"><i class="fas fa-plus"></i> Tambah Group</button>
        </div>

        <div class="bills-panel">
            <div id="bills-container">
                <div class="empty-state"><i class="fas fa-receipt"></i><p>Loading bills...</p></div>
            </div>
        </div>
    </div>

    <!-- Add Group Modal -->
    <div class="modal-overlay" id="groupModal">
        <div class="modal">
            <h3>Tambah Group</h3>
            <div class="form-group">
                <label>Nama Group</label>
                <input type="text" id="groupName" placeholder="contoh: Group A">
            </div>
            <div class="form-group">
                <label>Jumlah Orang</label>
                <input type="number" id="groupSize" value="2">
            </div>
            <div class="form-group">
                <label>Pilih Kursi</label>
                <div class="chair-grid" id="chair-grid"></div>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal('groupModal')">Batal</button>
                <button class="btn-primary" onclick="createGroup()">Tambah</button>
            </div>
        </div>
    </div>

    <!-- Split Modal -->
    <div class="modal-overlay" id="splitModal">
        <div class="modal">
            <h3>Split Bill Equally</h3>
            <div class="form-group">
                <label>Pilih Bill</label>
                <select id="splitBillSelect"></select>
            </div>
            <div class="form-group">
                <label>Jumlah Split</label>
                <input type="number" id="splitCount" value="2" min="2">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal('splitModal')">Batal</button>
                <button class="btn-primary" onclick="splitBill()">Split</button>
            </div>
        </div>
    </div>

    <!-- Merge Modal -->
    <div class="modal-overlay" id="mergeModal">
        <div class="modal">
            <h3>Merge Bills</h3>
            <p style="font-size:13px;color:#7f8c8d;margin-bottom:12px">Pilih minimal 2 bills untuk digabung</p>
            <div id="mergeBillList"></div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal('mergeModal')">Batal</button>
                <button class="btn-primary" onclick="mergeBills()">Merge</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/restoran/BACKEND/public/api/v1';
        let token = localStorage.getItem('authToken') || '';
        const urlParams = new URLSearchParams(window.location.search);
        const tableId = urlParams.get('table_id') || 1;
        let tableData = null;
        let selectedGroup = null;
        let selectedChairs = [];

        function authHeaders() {
            return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
        }

        function formatRupiah(n) {
            return 'Rp ' + Math.round(n).toLocaleString('id-ID');
        }

        // === LOAD DATA ===
        async function loadSummary() {
            try {
                const resp = await fetch(`${API_BASE}/bill-split/tables/${tableId}/summary`, { headers: authHeaders() });
                const data = await resp.json();
                if (data.success) {
                    tableData = data.data;
                    renderAll();
                }
            } catch (e) {
                console.error('Failed to load summary', e);
                document.getElementById('bills-container').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Failed to load data</p></div>';
            }
        }

        function renderAll() {
            // Table info
            const t = tableData.table;
            document.getElementById('table-info').innerHTML = `Meja <strong>${t.table_number}</strong> — ${t.table_name || ''} (${t.capacity || t.chair_count || 4} kursi)`;

            // Summary
            const s = tableData.summary;
            document.getElementById('sum-total').textContent = formatRupiah(s.total_amount);
            document.getElementById('sum-paid').textContent = formatRupiah(s.paid_amount);
            document.getElementById('sum-unpaid').textContent = formatRupiah(s.unpaid_amount);

            // Groups
            renderGroups();

            // Bills
            renderBills();
        }

        function renderGroups() {
            const list = document.getElementById('groups-list');
            if (!tableData.groups || tableData.groups.length === 0) {
                list.innerHTML = '<p style="font-size:12px;color:#95a5a6;text-align:center;padding:20px">Belum ada group</p>';
                return;
            }
            list.innerHTML = tableData.groups.map(g => {
                const bills = tableData.bills.filter(b => b.group_id == g.group_id);
                const total = bills.reduce((sum, b) => sum + parseFloat(b.total || 0), 0);
                const paid = bills.filter(b => b.payment_status === 'paid').length;
                const unpaid = bills.filter(b => b.payment_status === 'unpaid').length;
                return `
                    <div class="group-card ${selectedGroup == g.group_id ? 'selected' : ''}" style="border-color:${g.group_color}" onclick="selectGroup(${g.group_id})">
                        <div class="group-card-header">
                            <div class="group-color-dot" style="background:${g.group_color};border-color:${g.group_color}"></div>
                            <h5>${g.group_name || 'Group'}</h5>
                            <span class="group-status active">Active</span>
                        </div>
                        <div class="bill-amount" style="color:${g.group_color}">${formatRupiah(total)}</div>
                        <div class="bill-status ${unpaid > 0 ? 'unpaid' : 'paid'}">
                            <i class="fas ${unpaid > 0 ? 'fa-clock' : 'fa-check-circle'}"></i>
                            ${paid} paid, ${unpaid} unpaid
                        </div>
                        <div class="members-list">
                            <i class="fas fa-user"></i>${g.group_size || 1} orang
                            &nbsp; <i class="fas fa-chair"></i>${g.members?.length || 0} kursi
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderBills() {
            const container = document.getElementById('bills-container');
            if (!tableData.bills || tableData.bills.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-receipt"></i><p>Belum ada bill. Tambah group untuk membuat bill.</p></div>';
                return;
            }
            const bills = selectedGroup ? tableData.bills.filter(b => b.group_id == selectedGroup) : tableData.bills;
            if (bills.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-receipt"></i><p>Bill group ini sudah kosong</p></div>';
                return;
            }

            container.innerHTML = '<div class="bills-grid">' + bills.map(b => {
                const items = b.items || [];
                const itemsHtml = items.length > 0
                    ? items.map(i => `<div class="bill-item">
                        <div><span class="item-name">${i.product_name || 'Item'}</span><br><span class="item-split">${i.quantity}x @ ${formatRupiah(i.unit_price)}${i.split_type === 'partial' ? ' (split ' + (i.split_ratio * 100).toFixed(0) + '%)' : ''}</span></div>
                        <span class="item-price">${formatRupiah(i.total_price)}</span>
                      </div>`).join('')
                    : '<p style="font-size:12px;color:#95a5a6;padding:8px 0">No items assigned yet</p>';

                const isPaid = b.payment_status === 'paid';
                const color = b.group_color || '#667eea';

                return `
                    <div class="bill-card" style="border-top-color:${color}">
                        <div class="bill-card-header">
                            <div>
                                <h5>${b.group_name || 'Bill'} ${b.bill_type === 'split' ? '<span style="font-size:10px;color:#667eea">(Split)</span>' : ''}</h5>
                                <span class="bill-number">${b.bill_number || '#' + b.bill_id}</span>
                            </div>
                            <span style="font-size:11px;padding:3px 10px;border-radius:10px;background:${isPaid ? '#d4edda' : '#fdedec'};color:${isPaid ? '#155724' : '#c0392b'}">${isPaid ? 'PAID' : 'UNPAID'}</span>
                        </div>
                        <div class="bill-items">${itemsHtml}</div>
                        <div class="bill-totals">
                            <div class="bill-total-row"><span>Subtotal</span><span>${formatRupiah(b.subtotal || 0)}</span></div>
                            <div class="bill-total-row"><span>Tax (10%)</span><span>${formatRupiah(b.tax || 0)}</span></div>
                            <div class="bill-total-row"><span>Service (5%)</span><span>${formatRupiah(b.service_charge || 0)}</span></div>
                            <div class="bill-total-row grand"><span>Total</span><span>${formatRupiah(b.total || 0)}</span></div>
                        </div>
                        <div class="bill-actions">
                            ${isPaid
                                ? '<button class="btn-paid" disabled><i class="fas fa-check"></i> Paid</button>'
                                : `<button class="btn-pay" onclick="payBill(${b.bill_id})"><i class="fas fa-money-bill"></i> Bayar</button>
                                   <button class="btn-split" onclick="openSplitForBill(${b.bill_id})"><i class="fas fa-cut"></i> Split</button>`
                            }
                        </div>
                    </div>
                `;
            }).join('') + '</div>';
        }

        function selectGroup(groupId) {
            selectedGroup = selectedGroup == groupId ? null : groupId;
            renderGroups();
            renderBills();
        }

        // === MODALS ===
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function showAddGroupModal() {
            selectedChairs = [];
            const grid = document.getElementById('chair-grid');
            const chairs = tableData?.table?.chairs || [];
            if (chairs.length === 0) {
                grid.innerHTML = '<p style="font-size:12px;color:#95a5a6">No chairs defined for this table</p>';
            } else {
                grid.innerHTML = chairs.map(c => {
                    const assigned = tableData.groups.some(g => g.members?.some(m => m.chair_id == c.chair_id));
                    return `<div class="chair-pick ${assigned ? 'assigned' : ''}" data-chair="${c.chair_id}" onclick="toggleChair(${c.chair_id})">${c.chair_number}</div>`;
                }).join('');
            }
            document.getElementById('groupModal').classList.add('show');
        }

        function toggleChair(chairId) {
            const el = document.querySelector(`.chair-pick[data-chair="${chairId}"]`);
            if (el.classList.contains('assigned')) return;
            if (selectedChairs.includes(chairId)) {
                selectedChairs = selectedChairs.filter(c => c !== chairId);
                el.classList.remove('selected');
            } else {
                selectedChairs.push(chairId);
                el.classList.add('selected');
            }
        }

        async function createGroup() {
            const body = {
                table_id: parseInt(tableId),
                group_name: document.getElementById('groupName').value,
                group_size: parseInt(document.getElementById('groupSize').value),
                chairs: selectedChairs.map(cid => {
                    const c = (tableData?.table?.chairs || []).find(ch => ch.chair_id == cid);
                    return { chair_id: cid, chair_number: c ? c.chair_number : 0 };
                })
            };
            try {
                const resp = await fetch(`${API_BASE}/bill-split/groups`, {
                    method: 'POST', headers: authHeaders(), body: JSON.stringify(body)
                });
                const data = await resp.json();
                if (data.success) {
                    closeModal('groupModal');
                    await loadSummary();
                }
            } catch (e) { alert('Gagal membuat group'); }
        }

        async function payBill(billId) {
            if (!confirm('Tandai bill ini sebagai sudah dibayar?')) return;
            try {
                await fetch(`${API_BASE}/bill-split/bills/${billId}/payment`, {
                    method: 'PATCH', headers: authHeaders(),
                    body: JSON.stringify({ payment_method: 'cash' })
                });
                await loadSummary();
            } catch (e) { alert('Gagal update pembayaran'); }
        }

        function showSplitModal() {
            const select = document.getElementById('splitBillSelect');
            const bills = (tableData?.bills || []).filter(b => b.payment_status === 'unpaid');
            select.innerHTML = bills.map(b => `<option value="${b.bill_id}">${b.bill_number || '#' + b.bill_id} - ${formatRupiah(b.total)}</option>`).join('');
            document.getElementById('splitModal').classList.add('show');
        }

        function openSplitForBill(billId) {
            const select = document.getElementById('splitBillSelect');
            const bills = (tableData?.bills || []).filter(b => b.payment_status === 'unpaid');
            select.innerHTML = bills.map(b => `<option value="${b.bill_id}" ${b.bill_id == billId ? 'selected' : ''}>${b.bill_number || '#' + b.bill_id} - ${formatRupiah(b.total)}</option>`).join('');
            document.getElementById('splitModal').classList.add('show');
        }

        async function splitBill() {
            const billId = document.getElementById('splitBillSelect').value;
            const count = parseInt(document.getElementById('splitCount').value);
            if (!billId || count < 2) { alert('Pilih bill dan jumlah split minimal 2'); return; }
            try {
                const resp = await fetch(`${API_BASE}/bill-split/bills/${billId}/split`, {
                    method: 'POST', headers: authHeaders(),
                    body: JSON.stringify({ split_count: count, split_mode: 'equal' })
                });
                const data = await resp.json();
                if (data.success) {
                    closeModal('splitModal');
                    alert('Bill di-split jadi ' + count + ' bill, masing-masing ' + formatRupiah(data.data.per_person_total));
                    await loadSummary();
                }
            } catch (e) { alert('Gagal split bill'); }
        }

        function showMergeModal() {
            const bills = (tableData?.bills || []).filter(b => b.payment_status === 'unpaid');
            const list = document.getElementById('mergeBillList');
            list.innerHTML = bills.map(b => `
                <div style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #ddd;border-radius:6px;margin-bottom:6px;cursor:pointer" onclick="this.querySelector('input').click()">
                    <input type="checkbox" value="${b.bill_id}" class="merge-check">
                    <span style="font-size:13px">${b.bill_number || '#' + b.bill_id} - ${formatRupiah(b.total)}</span>
                </div>
            `).join('');
            document.getElementById('mergeModal').classList.add('show');
        }

        async function mergeBills() {
            const checked = Array.from(document.querySelectorAll('.merge-check:checked')).map(c => parseInt(c.value));
            if (checked.length < 2) { alert('Pilih minimal 2 bills'); return; }
            try {
                const resp = await fetch(`${API_BASE}/bill-split/merge`, {
                    method: 'POST', headers: authHeaders(),
                    body: JSON.stringify({ bill_ids: checked })
                });
                const data = await resp.json();
                if (data.success) {
                    closeModal('mergeModal');
                    await loadSummary();
                }
            } catch (e) { alert('Gagal merge bills'); }
        }

        // Init
        loadSummary();
    </script>
</body>
</html>
