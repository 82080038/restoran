        // Development quick login
        async function devQuickLogin(userKey) {
            const user = devUsers[userKey];
            if (!user) return;

            const devLoginBtn = document.getElementById('devLoginBtn');
            devLoginBtn.disabled = true;
            devLoginBtn.textContent = 'Logging in...';

            try {
                // Call backend API for authentication
                const response = await fetch('http://localhost:8000/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: user.username,
                        password: user.password
                    })
                });

                const data = await response.json();

                if (response.ok && data.access_token) {
                    // Store user data in localStorage
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user_role', user.role);
                    localStorage.setItem('user_type', user.type);
                    localStorage.setItem('user_level', user.level);
                    localStorage.setItem('user_id', data.user?.id || user.username);
                    localStorage.setItem('tenant_code', user.tenant || '');
                    localStorage.setItem('tenant_name', user.tenant_name || '');
                    localStorage.setItem('currentUser', JSON.stringify({
                        name: user.role,
                        username: user.username,
                        role: user.role,
                        type: user.type,
                        level: user.level,
                        tenant: user.tenant,
                        tenant_name: user.tenant_name
                    }));

                    // Refresh the page to trigger role-based redirect
                    window.location.reload();
                } else {
                    // If API fails, simulate login for development
                    console.warn('API login failed, using simulated login for development');
                    localStorage.setItem('access_token', 'dev_token_' + Date.now());
                    localStorage.setItem('user_role', user.role);
                    localStorage.setItem('user_type', user.type);
                    localStorage.setItem('user_level', user.level);
                    localStorage.setItem('user_id', user.username);
                    localStorage.setItem('tenant_code', user.tenant || '');
                    localStorage.setItem('tenant_name', user.tenant_name || '');
                    localStorage.setItem('currentUser', JSON.stringify({
                        name: user.role,
                        username: user.username,
                        role: user.role,
                        type: user.type,
                        level: user.level,
                        tenant: user.tenant,
                        tenant_name: user.tenant_name
                    }));

                    window.location.reload();
                }
            } catch (error) {
                console.error('Login error:', error);
                // Simulate login for development if API is not available
                localStorage.setItem('access_token', 'dev_token_' + Date.now());
                localStorage.setItem('user_role', user.role);
                localStorage.setItem('user_type', user.type);
                localStorage.setItem('user_level', user.level);
                localStorage.setItem('user_id', user.username);
                localStorage.setItem('tenant_code', user.tenant || '');
                localStorage.setItem('tenant_name', user.tenant_name || '');
                localStorage.setItem('currentUser', JSON.stringify({
                    name: user.role,
                    username: user.username,
                    role: user.role,
                    type: user.type,
                    level: user.level,
                    tenant: user.tenant,
                    tenant_name: user.tenant_name
                }));

                window.location.reload();
            }
        }

        // Development logout
        function devLogout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user_role');
            localStorage.removeItem('user_type');
            localStorage.removeItem('user_level');
            localStorage.removeItem('user_id');
            localStorage.removeItem('currentUser');
            localStorage.removeItem('token');
            localStorage.removeItem('tenant_code');
            localStorage.removeItem('tenant_name');

            document.getElementById('devUserSelect').value = '';
            document.getElementById('devLoginBtn').disabled = true;

            window.location.reload();
        }

        // Setup development login panel
        function setupDevLogin() {
            const devUserSelect = document.getElementById('devUserSelect');
            const devLoginBtn = document.getElementById('devLoginBtn');
            const devLogoutBtn = document.getElementById('devLogoutBtn');

            devUserSelect.addEventListener('change', () => {
                devLoginBtn.disabled = !devUserSelect.value;
            });

            devLoginBtn.addEventListener('click', () => {
                if (devUserSelect.value) {
                    devQuickLogin(devUserSelect.value);
                }
            });

            devLogoutBtn.addEventListener('click', devLogout);
        }

        // Check for authentication token in localStorage
        function checkAuth() {
            const token = localStorage.getItem('access_token');
            const userRole = localStorage.getItem('user_role');
            const userType = localStorage.getItem('user_type');
            const tenantName = localStorage.getItem('tenant_name');

            const roleBadge = document.getElementById('roleBadge');
            const btnGroup = document.getElementById('btnGroup');
            const loading = document.getElementById('loading');

            // Show loading
            loading.style.display = 'block';
            btnGroup.style.display = 'none';

            setTimeout(() => {
                loading.style.display = 'none';
                btnGroup.style.display = 'flex';

                if (token && userRole) {
                    // User is logged in
                    if (userType === 'tenant' || ['Administrator', 'Manager', 'Kasir', 'Koki', 'Waiter', 'Stok'].includes(userRole)) {
                        // Tenant/Staff role - redirect to dashboard
                        const tenantDisplay = tenantName ? ` (${tenantName})` : '';
                        roleBadge.textContent = 'Tenant/Staff: ' + userRole + tenantDisplay;
                        roleBadge.className = 'role-badge role-tenant';

                        // Auto-redirect to dashboard after 2 seconds
                        setTimeout(() => {
                            window.location.href = '/dashboard/index.html';
                        }, 2000);

                        // Update button to show auto-redirect
                        btnGroup.innerHTML = `
                            <p style="color: #155724; font-weight: 600;">
                                ✓ Logged in as ${userRole}${tenantDisplay}<br>
                                <small>Redirecting to Dashboard...</small>
                            </p>
                            <a href="/dashboard/index.html" class="btn btn-primary">
                                Go to Dashboard Now
                            </a>
                            <a href="/consumer/index.html" class="btn btn-secondary">
                                Browse as Consumer Instead
                            </a>
                        `;
                    } else {
                        // Consumer role - show consumer app
                        roleBadge.textContent = 'Consumer: ' + userRole;
                        roleBadge.className = 'role-badge role-consumer';

                        // Auto-redirect to consumer app after 2 seconds
                        setTimeout(() => {
                            window.location.href = '/consumer/index.html';
                        }, 2000);

                        // Update button to show auto-redirect
                        btnGroup.innerHTML = `
                            <p style="color: #004085; font-weight: 600;">
                                ✓ Logged in as ${userRole}<br>
                                <small>Redirecting to Consumer App...</small>
                            </p>
                            <a href="/consumer/index.html" class="btn btn-primary">
                                Go to Consumer App Now
                            </a>
                            <a href="/dashboard/index.html" class="btn btn-secondary">
                                Go to Dashboard (if applicable)
                            </a>
                        `;
                    }
                } else {
                    // Guest mode
                    roleBadge.textContent = 'Guest';
                    roleBadge.className = 'role-badge role-guest';

                    // Show default buttons
                    btnGroup.innerHTML = `
                        <a href="/consumer/index.html" class="btn btn-primary">
                            🍔 Browse as Consumer
                        </a>
                        <a href="/dashboard/index.html" class="btn btn-secondary">
                            👨‍💼 Admin Dashboard
                        </a>
                        <a href="/kiosk/index.html" class="btn btn-secondary">
                            🖥️ Kiosk Mode
                        </a>
                        <a href="/mobile/index.html" class="btn btn-secondary">
                            📱 Mobile Waiter
                        </a>
                    `;
                }
            }, 500);
        }
        
        // Run on page load
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            setupDevLogin();
        });
    </script>
</body>
</html>
