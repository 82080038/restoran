<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floor Status - F&B Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 220px; background: #2c3e50; color: white; flex-shrink: 0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 16px 20px; border-bottom: 1px solid #3d4f63; }
        .sidebar-header h3 { font-size: 16px; }
        .sidebar-header p { font-size: 11px; color: #95a5a6; margin-top: 4px; }
        .floor-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .floor-item { padding: 10px 14px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; font-size: 13px; display: flex; align-items: center; gap: 8px; transition: background 0.15s; }
        .floor-item:hover { background: #3d4f63; }
        .floor-item.active { background: #667eea; }

        /* Legend */
        .legend { padding: 12px 16px; border-top: 1px solid #3d4f63; }
        .legend h4 { font-size: 11px; color: #95a5a6; margin-bottom: 8px; text-transform: uppercase; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
        .legend-dot { width: 14px; height: 14px; border-radius: 4px; border: 2px solid; }
        .dot-available { background: #a8d8ea; border-color: #2c3e50; }
        .dot-occupied { background: #f5b7b1; border-color: #c0392b; }
        .dot-reserved { background: #f9e79f; border-color: #d4ac0d; }
        .dot-cleaning { background: #d5dbdb; border-color: #7f8c8d; }

        /* Stats Bar */
        .stats-bar { display: flex; gap: 12px; padding: 12px 20px; background: white; border-bottom: 1px solid #e0e0e0; }
        .stat-card { flex: 1; padding: 10px 16px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        .stat-card .stat-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .stat-card .stat-info { flex: 1; }
        .stat-card .stat-num { font-size: 22px; font-weight: 800; line-height: 1; }
        .stat-card .stat-label { font-size: 11px; color: #7f8c8d; }
        .stat-available { background: #e8f6f3; }
        .stat-available .stat-icon { background: #1abc9c; color: white; }
        .stat-available .stat-num { color: #1abc9c; }
        .stat-occupied { background: #fdedec; }
        .stat-occupied .stat-icon { background: #e74c3c; color: white; }
        .stat-occupied .stat-num { color: #e74c3c; }
        .stat-reserved { background: #fef9e7; }
        .stat-reserved .stat-icon { background: #f39c12; color: white; }
        .stat-reserved .stat-num { color: #f39c12; }
        .stat-cleaning { background: #f2f3f4; }
        .stat-cleaning .stat-icon { background: #95a5a6; color: white; }
        .stat-cleaning .stat-num { color: #7f8c8d; }

        /* Canvas */
        .canvas-area { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .canvas-wrapper { flex-grow: 1; overflow: auto; background: #e8eaed; padding: 20px; }
        .floor-canvas { position: relative; background: white; margin: 0 auto; box-shadow: 0 2px 12px rgba(0,0,0,0.1); border-radius: 8px; }
        .floor-canvas.grid::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 20px 20px; pointer-events: none; border-radius: 8px;
        }

        /* Zone */
        .zone-box { position: absolute; border: 2px dashed #bbb; border-radius: 8px; background: rgba(232,244,248,0.2); pointer-events: none; }
        .zone-label { position: absolute; top: 4px; left: 8px; font-size: 10px; color: #aaa; font-weight: 600; text-transform: uppercase; }

        /* Table */
        .table-item { position: absolute; cursor: pointer; transition: transform 0.15s; }
        .table-item:hover { transform: scale(1.05); z-index: 10; }
        .table-shape { position: relative; display: flex; align-items: center; justify-content: center; border: 2px solid; transition: box-shadow 0.15s; }
        .table-shape.rectangle { border-radius: 6px; }
        .table-shape.round { border-radius: 50%; }
        .table-shape.square { border-radius: 6px; }
        .table-shape.available { background: #a8d8ea; border-color: #2c3e50; }
        .table-shape.occupied { background: #f5b7b1; border-color: #c0392b; }
        .table-shape.reserved { background: #f9e79f; border-color: #d4ac0d; }
        .table-shape.cleaning { background: #d5dbdb; border-color: #7f8c8d; }
        .table-label { text-align: center; pointer-events: none; }
        .table-number { font-size: 14px; font-weight: 800; color: #2c3e50; }
        .table-cap { font-size: 9px; color: #555; }
        .table-status-icon { font-size: 10px; margin-top: 2px; }

        /* Chair */
        .chair { position: absolute; width: 20px; height: 20px; background: #bdc3c7; border: 1px solid #7f8c8d; border-radius: 3px; pointer-events: none; }
        .chair.round { border-radius: 50%; }

        /* Quick Action Popup */
        .quick-action { position: fixed; background: white; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); padding: 12px; z-index: 1000; display: none; min-width: 200px; }
        .quick-action.show { display: block; }
        .quick-action h5 { font-size: 13px; color: #2c3e50; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #eee; }
        .quick-action .qa-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 4px; transition: background 0.15s; }
        .quick-action .qa-btn:hover { background: #f0f0f5; }
        .qa-btn .qa-dot { width: 12px; height: 12px; border-radius: 3px; border: 2px solid; }
        .qa-available .qa-dot { background: #a8d8ea; border-color: #2c3e50; }
        .qa-occupied .qa-dot { background: #f5b7b1; border-color: #c0392b; }
        .qa-reserved .qa-dot { background: #f9e79f; border-color: #d4ac0d; }
        .qa-cleaning .qa-dot { background: #d5dbdb; border-color: #7f8c8d; }
        .quick-action .qa-info { font-size: 11px; color: #95a5a6; margin-top: 6px; padding-top: 6px; border-top: 1px solid #eee; }

        /* Auto refresh indicator */
        .refresh-indicator { position: fixed; bottom: 16px; right: 16px; background: white; padding: 8px 16px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-size: 12px; color: #7f8c8d; display: flex; align-items: center; gap: 8px; z-index: 100; }
        .refresh-dot { width: 8px; height: 8px; border-radius: 50%; background: #27ae60; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        .empty-state { text-align: center; padding: 60px 20px; color: #95a5a6; }
        .empty-state i { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-utensils"></i> Floor Status</h3>
            <p>Monitor status meja real-time</p>
        </div>
        <div class="floor-list" id="floor-list">
            <div class="empty-state"><i class="fas fa-building"></i><p>Loading...</p></div>
        </div>
        <div class="legend">
            <h4>Status Legend</h4>
            <div class="legend-item"><div class="legend-dot dot-available"></div> Available</div>
            <div class="legend-item"><div class="legend-dot dot-occupied"></div> Occupied (dipakai)</div>
            <div class="legend-item"><div class="legend-dot dot-reserved"></div> Reserved</div>
            <div class="legend-item"><div class="legend-dot dot-cleaning"></div> Cleaning (dibersihkan)</div>
        </div>
    </div>

    <!-- Canvas Area -->
    <div class="canvas-area">
        <!-- Stats Bar -->
        <div class="stats-bar" id="stats-bar">
            <div class="stat-card stat-available">
                <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                <div class="stat-info"><div class="stat-num" id="count-available">0</div><div class="stat-label">Available</div></div>
            </div>
            <div class="stat-card stat-occupied">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-info"><div class="stat-num" id="count-occupied">0</div><div class="stat-label">Occupied</div></div>
            </div>
            <div class="stat-card stat-reserved">
                <div class="stat-icon"><i class="fas fa-clock"></i></div>
                <div class="stat-info"><div class="stat-num" id="count-reserved">0</div><div class="stat-label">Reserved</div></div>
            </div>
            <div class="stat-card stat-cleaning">
                <div class="stat-icon"><i class="fas fa-broom"></i></div>
                <div class="stat-info"><div class="stat-num" id="count-cleaning">0</div><div class="stat-label">Cleaning</div></div>
            </div>
        </div>

        <!-- Canvas -->
        <div class="canvas-wrapper" id="canvas-wrapper">
            <div class="empty-state" id="canvas-empty">
                <i class="fas fa-map-marked-alt"></i>
                <p>Pilih lantai dari sidebar</p>
            </div>
            <div class="floor-canvas grid" id="floor-canvas" style="display:none"></div>
        </div>
    </div>

    <!-- Quick Action Popup -->
    <div class="quick-action" id="quick-action">
        <h5 id="qa-title">Meja -</h5>
        <button class="qa-btn qa-available" onclick="setTableStatus('AVAILABLE')">
            <div class="qa-dot"></div> Set Available
        </button>
        <button class="qa-btn qa-occupied" onclick="setTableStatus('OCCUPIED')">
            <div class="qa-dot"></div> Set Occupied
        </button>
        <button class="qa-btn qa-reserved" onclick="setTableStatus('RESERVED')">
            <div class="qa-dot"></div> Set Reserved
        </button>
        <button class="qa-btn qa-cleaning" onclick="setTableStatus('CLEANING')">
            <div class="qa-dot"></div> Set Cleaning
        </button>
        <div class="qa-info" id="qa-info"></div>
    </div>

    <!-- Refresh indicator -->
    <div class="refresh-indicator">
        <div class="refresh-dot"></div>
        <span>Auto-refresh 10s</span>
    </div>

    <script>
        const API_BASE = window.location.origin + '/restoran/BACKEND/public/api/v1';
        let token = localStorage.getItem('authToken') || '';
        let currentFloorId = null;
        let floorData = null;
        let selectedTableId = null;
        let refreshTimer = null;

        function authHeaders() {
            return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
        }

        // === FLOORS ===
        async function loadFloors() {
            try {
                const resp = await fetch(`${API_BASE}/floor-plan/floors`, { headers: authHeaders() });
                const data = await resp.json();
                if (data.success) renderFloors(data.data);
            } catch (e) { console.error('Failed to load floors', e); }
        }

        function renderFloors(floors) {
            const list = document.getElementById('floor-list');
            if (!floors || floors.length === 0) {
                list.innerHTML = '<div class="empty-state"><i class="fas fa-building"></i><p>Belum ada lantai</p></div>';
                return;
            }
            list.innerHTML = floors.map(f => `
                <div class="floor-item ${f.floor_id == currentFloorId ? 'active' : ''}" onclick="selectFloor(${f.floor_id})">
                    <i class="fas fa-layer-group"></i>
                    <div>
                        <div>${f.floor_name}</div>
                        <div style="font-size:10px;color:#95a5a6">${f.floor_type || ''}</div>
                    </div>
                </div>
            `).join('');
        }

        async function selectFloor(floorId) {
            currentFloorId = floorId;
            await loadLayout();
            loadFloors();
        }

        // === LAYOUT ===
        async function loadLayout() {
            if (!currentFloorId) return;
            try {
                const resp = await fetch(`${API_BASE}/floor-plan/layout?floor_id=${currentFloorId}`, { headers: authHeaders() });
                const data = await resp.json();
                if (data.success) {
                    floorData = data.data;
                    renderLayout();
                    updateStats();
                }
            } catch (e) { console.error('Failed to load layout', e); }
        }

        function renderLayout() {
            const canvas = document.getElementById('floor-canvas');
            const empty = document.getElementById('canvas-empty');
            if (!floorData) { canvas.style.display = 'none'; empty.style.display = 'block'; return; }

            empty.style.display = 'none';
            canvas.style.display = 'block';
            canvas.style.width = floorData.floor.canvas_width + 'px';
            canvas.style.height = floorData.floor.canvas_height + 'px';
            canvas.innerHTML = '';

            // Render zones
            (floorData.zones || []).forEach(zone => {
                const z = document.createElement('div');
                z.className = 'zone-box';
                z.style.left = zone.pos_x + 'px';
                z.style.top = zone.pos_y + 'px';
                z.style.width = zone.zone_width + 'px';
                z.style.height = zone.zone_height + 'px';
                z.style.borderColor = zone.zone_color || '#aaa';
                z.innerHTML = `<div class="zone-label">${zone.zone_name}</div>`;
                canvas.appendChild(z);
            });

            // Render tables
            (floorData.tables || []).forEach(table => {
                const t = document.createElement('div');
                t.className = 'table-item';
                t.style.left = table.pos_x + 'px';
                t.style.top = table.pos_y + 'px';
                t.style.transform = `rotate(${table.table_rotation || 0}deg)`;

                const statusClass = (table.status || 'AVAILABLE').toLowerCase();
                const shape = document.createElement('div');
                shape.className = `table-shape ${table.table_shape || 'rectangle'} ${statusClass}`;
                shape.style.width = table.table_width + 'px';
                shape.style.height = table.table_height + 'px';

                const statusIcon = {
                    'AVAILABLE': '<i class="fas fa-check" style="color:#1abc9c"></i>',
                    'OCCUPIED': '<i class="fas fa-users" style="color:#c0392b"></i>',
                    'RESERVED': '<i class="fas fa-clock" style="color:#d4ac0d"></i>',
                    'CLEANING': '<i class="fas fa-broom" style="color:#7f8c8d"></i>'
                };

                shape.innerHTML = `
                    <div class="table-label">
                        <div class="table-number">${table.table_number}</div>
                        <div class="table-cap">${table.capacity || table.chair_count || 4}pax</div>
                        <div class="table-status-icon">${statusIcon[table.status] || ''}</div>
                    </div>
                `;
                t.appendChild(shape);

                // Render chairs
                (table.chairs || []).forEach(chair => {
                    const c = document.createElement('div');
                    c.className = `chair ${chair.chair_shape === 'round' ? 'round' : ''}`;
                    c.style.left = chair.pos_x + 'px';
                    c.style.top = chair.pos_y + 'px';
                    c.style.transform = `rotate(${chair.chair_rotation || 0}deg)`;
                    t.appendChild(c);
                });

                t.onclick = (e) => {
                    e.stopPropagation();
                    showQuickAction(e, table);
                };
                canvas.appendChild(t);
            });
        }

        // === STATS ===
        function updateStats() {
            const tables = floorData?.tables || [];
            const counts = { AVAILABLE: 0, OCCUPIED: 0, RESERVED: 0, CLEANING: 0 };
            tables.forEach(t => { counts[t.status] = (counts[t.status] || 0) + 1; });

            document.getElementById('count-available').textContent = counts.AVAILABLE;
            document.getElementById('count-occupied').textContent = counts.OCCUPIED;
            document.getElementById('count-reserved').textContent = counts.RESERVED;
            document.getElementById('count-cleaning').textContent = counts.CLEANING;
        }

        // === QUICK ACTION ===
        function showQuickAction(e, table) {
            selectedTableId = table.table_id;
            const qa = document.getElementById('quick-action');
            const rect = e.currentTarget.getBoundingClientRect();

            let x = rect.right + 8;
            let y = rect.top;
            if (x + 220 > window.innerWidth) x = rect.left - 220;
            if (y + 300 > window.innerHeight) y = window.innerHeight - 310;

            qa.style.left = x + 'px';
            qa.style.top = y + 'px';
            qa.classList.add('show');

            document.getElementById('qa-title').textContent = `Meja ${table.table_number}${table.table_name ? ' - ' + table.table_name : ''}`;
            document.getElementById('qa-info').innerHTML = `
                Status: <strong>${table.status}</strong><br>
                Kapasitas: ${table.capacity || table.chair_count || 4} kursi<br>
                Zona: ${table.area || '-'}
            `;
        }

        async function setTableStatus(status) {
            if (!selectedTableId) return;
            document.getElementById('quick-action').classList.remove('show');

            try {
                // Use the existing table status endpoint
                await fetch(`${API_BASE}/tables/${selectedTableId}/status`, {
                    method: 'PATCH', headers: authHeaders(),
                    body: JSON.stringify({ status })
                });
                // Reload layout to reflect change
                await loadLayout();
            } catch (e) {
                // Fallback: use floor-plan table update
                try {
                    await fetch(`${API_BASE}/floor-plan/tables/${selectedTableId}`, {
                        method: 'PUT', headers: authHeaders(),
                        body: JSON.stringify({ status })
                    });
                    await loadLayout();
                } catch (e2) { alert('Gagal mengubah status meja'); }
            }
        }

        // Close quick action on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.table-item') && !e.target.closest('.quick-action')) {
                document.getElementById('quick-action').classList.remove('show');
            }
        });

        // === AUTO REFRESH ===
        function startAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(async () => {
                if (currentFloorId) await loadLayout();
            }, 10000);
        }

        // Init
        loadFloors();
        startAutoRefresh();
    </script>
</body>
</html>
