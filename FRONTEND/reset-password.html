<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - F&B Management System</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .reset-container { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); padding: 40px; width: 400px; max-width: 90%; }
        .logo { text-align: center; font-size: 48px; margin-bottom: 10px; }
        .reset-container h1 { text-align: center; font-size: 22px; color: #2c3e50; margin-bottom: 8px; }
        .reset-container p { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #2c3e50; margin-bottom: 6px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; transition: border 0.2s; }
        .form-group input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .btn-reset { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-reset:hover { background: #5568d3; }
        .btn-reset:disabled { background: #ccc; cursor: not-allowed; }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #667eea; text-decoration: none; font-size: 13px; }
        .back-link a:hover { text-decoration: underline; }
        .password-strength { height: 4px; border-radius: 2px; margin-top: 6px; transition: all 0.3s; }
        .strength-weak { background: #e74c3c; width: 33%; }
        .strength-medium { background: #f39c12; width: 66%; }
        .strength-strong { background: #27ae60; width: 100%; }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="logo">🍽️</div>
        <h1>Reset Password</h1>
        <p id="subtitle">Enter your new password below</p>

        <div id="alert-container"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" placeholder="Enter new password" required minlength="6" oninput="checkStrength()">
                <div class="password-strength" id="strength-bar" style="width:0"></div>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn-reset" id="submitBtn">
                <span id="btn-text">Reset Password</span>
            </button>
        </form>

        <div class="back-link">
            <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/restoran/BACKEND/public/api/v1';
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('subtitle').textContent = 'Invalid reset link';
            document.getElementById('resetForm').style.display = 'none';
            showAlert('error', 'No reset token found. Please request a new password reset link.');
        }

        function checkStrength() {
            const pwd = document.getElementById('new_password').value;
            const bar = document.getElementById('strength-bar');
            if (!pwd) { bar.style.width = '0'; bar.className = 'password-strength'; return; }

            let score = 0;
            if (pwd.length >= 6) score++;
            if (pwd.length >= 10) score++;
            if (/[A-Z]/.test(pwd)) score++;
            if (/[0-9]/.test(pwd)) score++;
            if (/[^A-Za-z0-9]/.test(pwd)) score++;

            bar.className = 'password-strength';
            if (score <= 2) bar.classList.add('strength-weak');
            else if (score <= 3) bar.classList.add('strength-medium');
            else bar.classList.add('strength-strong');
        }

        function showAlert(type, message) {
            const container = document.getElementById('alert-container');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPwd = document.getElementById('new_password').value;
            const confirmPwd = document.getElementById('confirm_password').value;

            if (newPwd !== confirmPwd) {
                showAlert('error', 'Passwords do not match');
                return;
            }

            if (newPwd.length < 6) {
                showAlert('error', 'Password must be at least 6 characters');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btn-text');
            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span> Resetting...';

            try {
                const resp = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPwd })
                });
                const data = await resp.json();

                if (data.success) {
                    showAlert('success', data.message || 'Password reset successfully!');
                    document.getElementById('resetForm').style.display = 'none';
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                } else {
                    showAlert('error', data.message || 'Failed to reset password');
                    btn.disabled = false;
                    btnText.textContent = 'Reset Password';
                }
            } catch (err) {
                showAlert('error', 'Connection error. Please try again.');
                btn.disabled = false;
                btnText.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
