version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ebp_restaurant_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ebp_restaurant_db
      MYSQL_USER: ebp_app
      MYSQL_PASSWORD: ebp_secure_password_2026
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - ebp_network

  # PHP Backend Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ebp_restaurant_app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ebp_restaurant_db
      DB_USER: ebp_app
      DB_PASSWORD: ebp_secure_password_2026
      JWT_SECRET: ebp_secret_key_change_in_production
      APP_ENV: production
      APP_DEBUG: false
    volumes:
      - .:/var/www/html
      - ./logs:/var/www/html/logs
    depends_on:
      - mysql
    networks:
      - ebp_network

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: ebp_restaurant_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ebp_network

  # phpMyAdmin for database management (optional)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: ebp_restaurant_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - ebp_network

volumes:
  mysql_data:
    driver: local

networks:
  ebp_network:
    driver: bridge
